name: Build Wheels

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    tags: [ 'v*' ]

jobs:
  build_wheels:
    name: Build_on_${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    env:
      CIBW_BUILD: "cp312-*"
      CIBW_SKIP: "*-win32 *_i686 pp* *-musllinux_*"
      SKBUILD_VERBOSE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone StOpt
        run: git clone https://gitlab.com/stochastic-control/StOpt.git

      - name: Make macOS scripts executable
        if: runner.os == 'macOS'
        run: chmod +x StOpt/utils/*.sh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      ###########################################################################
      # PREPARE DEPENDENCIES (Windows Only)
      ###########################################################################
      - name: Install Conan
        if: runner.os == 'Windows'
        run: |
          pip install conan
          conan profile detect --force

      - name: Install Dependencies with Conan
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd StOpt
          $conanfile = @"
          [requires]
          boost/1.84.0
          eigen/3.4.0
          pybind11/2.11.1
          zlib/1.3.1
          bzip2/1.0.8
          
          [generators]
          CMakeDeps
          CMakeToolchain

          [options]
          boost/*:shared=True
          "@
          Set-Content -Path conanfile.txt -Value $conanfile
          conan install . --output-folder=conan_build --build=missing -s build_type=Release

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.17.0

      ###########################################################################
      # BUILD — Linux & macOS
      ###########################################################################
      - name: Build_wheels_Linux_macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd StOpt
          python -m cibuildwheel --output-dir ../wheelhouse
        env:
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y wget python3-devel cmake make gcc-c++ zlib-devel bzip2-devel &&
            wget https://gitlab.com/libeigen/eigen/-/archive/3.4.0/eigen-3.4.0.tar.gz &&
            tar -xzf eigen-3.4.0.tar.gz &&
            cd eigen-3.4.0 && cmake -B build -DCMAKE_INSTALL_PREFIX=/usr && cmake --build build --target install && cd .. &&
            wget https://archives.boost.io/release/1.84.0/source/boost_1_84_0.tar.gz &&
            tar -xzf boost_1_84_0.tar.gz &&
            cd boost_1_84_0 && ./bootstrap.sh && ./b2 install --prefix=/usr/local --with-serialization --with-system --with-random --with-log --with-thread --with-chrono --with-atomic threading=multi link=shared
          
          CIBW_BEFORE_ALL_MACOS: "brew install boost eigen cmake zlib bzip2"
          
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            export WHEEL_PATH={wheel} &&
            TMPDIR=$(mktemp -d) &&
            unzip "$WHEEL_PATH" -d "$TMPDIR" &&
            bash utils/fix_stopt_macos_libs.sh "$TMPDIR" &&
            (cd "$TMPDIR" && zip -r -9 "$(basename $WHEEL_PATH)" .) &&
            mv "$TMPDIR/$(basename $WHEEL_PATH)" "$WHEEL_PATH" &&
            rm -rf "$TMPDIR" &&
            delocate-wheel -v --lib-sdir pystopt -w {dest_dir} "$WHEEL_PATH"

  
      ###########################################################################
      # BUILD — Windows
      ###########################################################################
      - name: Load MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build_wheel_Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd StOpt
          python -m cibuildwheel --output-dir ../wheelhouse
        env:
          CIBW_BUILD_FRONTEND: "pip"
          CIBW_BEFORE_BUILD_WINDOWS: "pip install numpy delvewheel ninja"

          # Syntaxe stable
          CIBW_CONFIG_SETTINGS_WINDOWS: 'cmake.args=-GNinja;-Wno-dev'

          # Chemins relatifs uniquement
          CIBW_ENVIRONMENT_WINDOWS: |
            CMAKE_TOOLCHAIN_FILE="conan_build/conan_toolchain.cmake"
            CMAKE_BUILD_TYPE=Release
            CMAKE_GENERATOR_PLATFORM=""
            STOPT_PIP_LAYOUT=ON
            STOPT_PY_DEST="pystopt"
            BUILD_PYTHON=ON
            BUILD_MPI=OFF
            BUILD_TEST=OFF
            BUILD_SDDP=OFF

          # Réparation wheel avec chemins Conan
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >
            delvewheel repair --add-path "conan_build" -w {dest_dir} {wheel}      - name: Load MSVC environment
  

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl