name: Build Wheels for StOpt (Boost 1.84 + Eigen 3.4 + pybind11)

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build_wheels:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      CIBW_BUILD: "cp310-* cp311-* cp312-*"
      CIBW_SKIP: "*-win32 *_i686 pp* *-musllinux_*"

      # Correction Linux : scikit-build-core utilise le bon Python
      CIBW_ENVIRONMENT_LINUX: "SKBUILD_PYTHON_INTERPRETER={python}"

      # Correction Windows
      CIBW_ARCHS_WINDOWS: "AMD64"
      CIBW_ENVIRONMENT_WINDOWS: "CMAKE_TOOLCHAIN_FILE=CMAKE_TOOLCHAIN_FILE=D:/a/stopt-wheels-builder/stopt-wheels-builder/StOpt/vcpkg/scripts/buildsystems/vcpkg.cmake VCPKG_FEATURE_FLAGS=-manifests BUILD_MPI=OFF BUILD_TEST=OFF BUILD_SDDP=OFF BUILD_DPCUTS=OFF BUILD_BRANCHING=OFF"

      # Correction macOS
      CIBW_ARCHS_MACOS: "x86_64"
      CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=10.15 Boost_NO_BOOST_CMAKE=ON"

      # Test simple
      #CIBW_TEST_COMMAND: "python -c 'import pystopt; print(pystopt.__version__)'"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone StOpt
        run: git clone https://gitlab.com/stochastic-control/StOpt.git

      - name: Prepare vcpkg for Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: 
          cd StOpt
          if (Test-Path vcpkg) { Remove-Item -Recurse -Force vcpkg }
          git clone https://github.com/microsoft/vcpkg vcpkg
          .\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          #  the needed libs
          .\vcpkg\vcpkg.exe install `
            pybind11 `
            boost-multi-array `
            boost-timer `
            boost-test `
            boost-random `
            boost-chrono `
            boost-system `
            boost-log `
            boost-serialization `
            eigen3 `
            coin-or-osi `
            coin-or-clp `
            --triplet x64-windows
	  
      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.17.0

      - name: Build wheels
        run: |
          cd StOpt
          cibuildwheel --output-dir ../wheelhouse
        env:

          # Linux
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y wget python3-devel cmake make gcc-c++ zlib-devel bzip2-devel &&
            wget https://gitlab.com/libeigen/eigen/-/archive/3.4.0/eigen-3.4.0.tar.gz &&
            tar -xzf eigen-3.4.0.tar.gz &&
            cd eigen-3.4.0 &&
            cmake -B build -DCMAKE_INSTALL_PREFIX=/usr &&
            cmake --build build --target install &&
            cd .. &&
            wget https://archives.boost.io/release/1.84.0/source/boost_1_84_0.tar.gz &&
            tar -xzf boost_1_84_0.tar.gz &&
            cd boost_1_84_0 &&
            ./bootstrap.sh &&
            ./b2 install --prefix=/usr/local --with-serialization --with-system --with-random --with-log --with-thread --with-chrono --with-atomic threading=multi link=shared

          # macOS
          CIBW_BEFORE_ALL_MACOS: >
            brew update &&
            brew install boost eigen cmake zlib bzip2

          #  On installe les dylibs AVANT delocate
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            #cmake --install build --prefix {dest_dir}/pystopt &&
            delocate-wheel -v -w {dest_dir} {wheel}

          # Windows
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >
            delvewheel repair --add-path ./vcpkg/installed/x64-windows/bin -w {dest_dir} {wheel}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl