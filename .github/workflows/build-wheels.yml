name: Build Wheels for StOpt (Boost 1.84.0 + Eigen 3.4.0 + pybind11)

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} for Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: [ "3.12"]

    steps:
      # ============================================================
      # 1) Checkout
      # ============================================================
      - uses: actions/checkout@v4

      # ============================================================
      # 2) Clone StOpt
      # ============================================================
      - name: Clone StOpt
        run: git clone https://gitlab.com/stochastic-control/StOpt.git

      # ============================================================
      # 3) Setup Python
      # ============================================================
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python }}

      # ============================================================
      # 4) Install cibuildwheel + pybind11 + cmake + ninja
      # ============================================================
      - name: Install build tools (cibuildwheel + pybind11 + cmake + ninja)
        run: |
          pip install --upgrade pip
          pip install cibuildwheel pybind11 cmake ninja

      ########################################################################
      # 5) LINUX : Eigen + Boost compiled (chrono, thread, log, timer, serialization, system, test)
      ########################################################################
      - name: Build wheels (Linux)
        if: runner.os == 'Linux'
        run: |
          cd StOpt

          CIBW_BEFORE_ALL_LINUX=" \
            echo '=== Build Eigen ===' \
            && curl -L -o eigen.tar.gz https://gitlab.com/libeigen/eigen/-/archive/3.4.0/eigen-3.4.0.tar.gz \
            && tar -xzf eigen.tar.gz \
            && cmake -S eigen-3.4.0 -B eigen-build -DCMAKE_INSTALL_PREFIX=/project/deps \
            && cmake --build eigen-build --target install --config Release \
            \
            && echo '=== Download Boost 1.84.0 ===' \
            && curl -L -o boost.tar.gz https://boostorg.jfrog.io/artifactory/main/release/1.84.0/source/boost_1_84_0.tar.gz \
            && tar -xzf boost.tar.gz \
            && cd boost_1_84_0 \
            \
            && echo '=== Bootstrap Boost ===' \
            && ./bootstrap.sh --prefix=/project/deps \
            \
            && echo '=== Build required Boost modules ===' \
            && ./b2 install \
                --with-chrono \
                --with-thread \
                --with-log \
                --with-timer \
                --with-serialization \
                --with-system \
                --with-test \
                -j$(nproc) \
            && cd .. \
          " \
          CIBW_ENVIRONMENT="CMAKE_PREFIX_PATH=/project/deps LD_LIBRARY_PATH=/project/deps/lib:$LD_LIBRARY_PATH" \
          CIBW_BUILD_VERBOSITY=3 cibuildwheel --platform linux --output-dir ../wheelhouse


      ########################################################################
      # 6) macOS : brew install Eigen + Boost (déjà compilé)
      ########################################################################
      - name: Build wheels (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install eigen boost
          cd StOpt
          CIBW_ENVIRONMENT="CMAKE_PREFIX_PATH=$(brew --prefix)" \
          CIBW_BUILD_VERBOSITY=3 cibuildwheel --platform macos --output-dir ../wheelhouse

      ########################################################################
      # 7) Windows : Eigen compiled + Boost compiled (same modules as Linux)
      ########################################################################
      - name: Build wheels (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          choco install ninja -y

          mkdir C:\deps

          # ---------------------
          # Eigen
          # ---------------------
          Invoke-WebRequest -OutFile eigen.zip https://gitlab.com/libeigen/eigen/-/archive/3.4.0/eigen-3.4.0.zip
          Expand-Archive eigen.zip -DestinationPath .
          cmake -S eigen-3.4.0 -B eigen-build -DCMAKE_INSTALL_PREFIX=C:\deps
          cmake --build eigen-build --config Release --target install

          # ---------------------
          # Boost 1.84.0
          # ---------------------
          Invoke-WebRequest -OutFile boost.zip https://boostorg.jfrog.io/artifactory/main/release/1.84.0/source/boost_1_84_0.zip
          tar -xzf boost.tar.gz
          cd boost_1_84_0

          .\bootstrap.bat --prefix=C:\deps

          .\b2 install `
              --with-chrono `
              --with-thread `
              --with-log `
              --with-timer `
              --with-serialization `
              --with-system `
              --with-test `
              -j4

          cd ..\StOpt

          # Build wheels
          $env:CIBW_ENVIRONMENT="CMAKE_PREFIX_PATH=C:\deps PATH=C:\deps\bin;$Env:PATH"
          cibuildwheel --platform windows --output-dir ../wheelhouse

      ########################################################################
      # 8) Artifacts
      ########################################################################
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python }}
          path: wheelhouse/*.whl