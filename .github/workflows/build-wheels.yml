name: Build Wheels for StOpt

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build_wheels:
    name: Build ${{ matrix.os }} (py${{ matrix.python }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: [ "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Clone StOpt
        run: git clone https://gitlab.com/stochastic-control/StOpt.git

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python }}

      - name: Install tools
        run: |
          pip install --upgrade pip
          pip install cibuildwheel pybind11 cmake ninja

      # Linux
      - name: Build wheels (Linux)
        if: runner.os == 'Linux'
        run: |
          cd StOpt
          CIBW_BEFORE_ALL_LINUX="../scripts/build_deps_linux.sh" \
          CIBW_ENVIRONMENT="CMAKE_PREFIX_PATH=/project/deps LD_LIBRARY_PATH=/project/deps/lib:\$LD_LIBRARY_PATH" \
          cibuildwheel --platform linux --output-dir ../wheelhouse

      # macOS
      - name: Build wheels (macOS)
        if: runner.os == 'macOS'
        run: |
          cd StOpt
          CIBW_BEFORE_ALL_MACOS="../scripts/build_deps_macos.sh" \
          CIBW_ARCHS_MACOS="x86_64" \
          CIBW_ENVIRONMENT="CMAKE_PREFIX_PATH=$(brew --prefix)" \
          cibuildwheel --platform macos --output-dir ../wheelhouse

      # Windows
      - name: Build wheels (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          choco install ninja -y
          mkdir C:\deps
          cd StOpt
          $env:CIBW_BEFORE_ALL_WINDOWS = "..\\scripts\\build_deps_windows.ps1"
          $env:CIBW_ENVIRONMENT="CMAKE_PREFIX_PATH=C:\deps PATH=C:\deps\bin;$Env:PATH"
          cibuildwheel --platform windows --output-dir ..\wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python }}
          path: wheelhouse/*.whl