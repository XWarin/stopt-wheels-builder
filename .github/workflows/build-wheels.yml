name: Build Wheels

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    tags: [ 'v*' ]

jobs:
  build_wheels:
    name: Build_on_${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        #os: [
        #  windows-latest,
        #  ubuntu-latest,
        #  macos-latest
        #]
        os: [
          windows-latest
         ]

    env:
      CIBW_BUILD: "cp311-*"
      #CIBW_BUILD: "cp311-* cp312-* cp313-*"
      CIBW_SKIP: "*-win32 *_i686 pp* *-musllinux_*"

      CIBW_ENVIRONMENT_LINUX: "SKBUILD_PYTHON_INTERPRETER={python}"

      CIBW_ARCHS_MACOS: "x86_64"
      CIBW_ENVIRONMENT_MACOS: >
        CC=/usr/bin/clang
        CXX=/usr/bin/clang++
        MACOSX_DEPLOYMENT_TARGET=10.15
        Boost_NO_BOOST_CMAKE=ON

      SKBUILD_CMAKE_INSTALL_DIR: "{package}/pystopt"
      SKBUILD_VERBOSE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone StOpt
        run: git clone https://gitlab.com/stochastic-control/StOpt.git

      - name: Make macOS scripts executable
        run: chmod +x StOpt/utils/*.sh

      - name: Setup Python for Linux/macOS
        if: runner.os != 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache vcpkg (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            StOpt/vcpkg
            StOpt/vcpkg/installed
          key: ${{ runner.os }}-vcpkg-stopt-v2

      - name: Prepare vcpkg for Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd StOpt
          if (-not (Test-Path vcpkg)) {
            git clone https://github.com/microsoft/vcpkg vcpkg
            .\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          }
          if (Test-Path vcpkg.json) { Remove-Item -Force vcpkg.json }
          .\vcpkg\vcpkg.exe install pybind11 boost-multi-array boost-random boost-serialization eigen3 --triplet x64-windows

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.17.0

      ###########################################################################
      # BUILD — Linux & macOS
      ###########################################################################
      - name: Build_wheels_Linux_macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd StOpt
          python -m cibuildwheel --output-dir ../wheelhouse
        env:
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y wget python3-devel cmake make gcc-c++ zlib-devel bzip2-devel &&
            wget https://gitlab.com/libeigen/eigen/-/archive/3.4.0/eigen-3.4.0.tar.gz &&
            tar -xzf eigen-3.4.0.tar.gz &&
            cd eigen-3.4.0 && cmake -B build -DCMAKE_INSTALL_PREFIX=/usr && cmake --build build --target install && cd .. &&
            wget https://archives.boost.io/release/1.84.0/source/boost_1_84_0.tar.gz &&
            tar -xzf boost_1_84_0.tar.gz &&
            cd boost_1_84_0 && ./bootstrap.sh && ./b2 install --prefix=/usr/local --with-serialization --with-system --with-random --with-log --with-thread --with-chrono --with-atomic threading=multi link=shared

          CIBW_BEFORE_ALL_MACOS: "brew install boost eigen cmake zlib bzip2"

          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            export WHEEL_PATH={wheel} &&
            TMPDIR=$(mktemp -d) &&
            unzip "$WHEEL_PATH" -d "$TMPDIR" &&
            bash utils/fix_stopt_macos_libs.sh "$TMPDIR" &&
            (cd "$TMPDIR" && zip -r -9 "$(basename $WHEEL_PATH)" .) &&
            mv "$TMPDIR/$(basename $WHEEL_PATH)" "$WHEEL_PATH" &&
            rm -rf "$TMPDIR" &&
            delocate-wheel -v --lib-sdir pystopt -w {dest_dir} "$WHEEL_PATH"

      ###########################################################################
      # PREPARATION VCPKG (C++ UNIQUEMENT)
      ###########################################################################
      - name: Prepare vcpkg for Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd StOpt
          if (-not (Test-Path vcpkg)) {
            git clone https://github.com/microsoft/vcpkg vcpkg
            .\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          }
          if (Test-Path vcpkg.json) { Remove-Item -Force vcpkg.json }
          # On installe Boost, Eigen et la compression. PAS de pybind11 ici.
          .\vcpkg\vcpkg.exe install boost-multi-array boost-random boost-serialization eigen3 zlib bzip2 --triplet x64-windows

      ###########################################################################
      # BUILD — Windows (Hybride Pip/Vcpkg)
      ###########################################################################
      - name: Build_wheel_Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd StOpt
          python -m cibuildwheel --output-dir ../wheelhouse
        env:
          CIBW_BUILD_FRONTEND: "pip"
          
          # CRUCIAL : On installe les outils Python via pip dans l'env de build
          CIBW_BEFORE_BUILD_WINDOWS: |
            python --version
            python -c "import sys; print(f'Executable: {sys.executable}')"
            pip install pybind11 numpy
            pip show pybind11 numpy         

          CIBW_ENVIRONMENT_WINDOWS: |
            CMAKE_TOOLCHAIN_FILE=vcpkg/scripts/buildsystems/vcpkg.cmake
            VCPKG_FEATURE_FLAGS=-manifests
            # Forcer l'usage du Python de cibuildwheel
            Python_EXECUTABLE="{python}"
            Python_ROOT_DIR="{python_root}"
            Python_INCLUDE_DIR="{python_root}/include"
            Python_LIBRARY="{python_root}/libs/python{python_version_nodot}.lib"
            # Arguments CMake pour scikit-build-core
            CMAKE_ARGS="-DPython_EXECUTABLE={python} -DPython_ROOT_DIR={python_root} -DPython_FIND_STRATEGY=LOCATION -DPython_FIND_VIRTUALENV=ONLY"
            SKBUILD_BUILD_DIR="build_{python_version}"
            StOpt_PIP_LAYOUT=ON
            BUILD_MPI=OFF
            BUILD_TEST=OFF
            WITHCIBUILD=ON

          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >
            delvewheel repair --add-path ./vcpkg/installed/x64-windows/bin -w {dest_dir} {wheel}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl