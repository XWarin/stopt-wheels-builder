name: Build Wheels for StOpt

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build_wheels:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # On laisse cibuildwheel gérer les versions de python en interne
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone StOpt
        run: git clone https://gitlab.com/stochastic-control/StOpt.git

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.17.0

      - name: Build wheels
        run: |
          cd StOpt
          python -m cibuildwheel --output-dir ../wheelhouse
        env:
          # Configuration générale
          CIBW_BUILD: "cp312-*" # Force Python 3.12 uniquement
          
          # Linux : On installe les dépendances dans le container manylinux
          CIBW_BEFORE_ALL_LINUX: yum install -y boost-devel cmake eigen3-devel

          # macOS : Installation via Brew
          CIBW_BEFORE_ALL_MACOS: brew install boost eigen cmake
          CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=10.15

          # Windows : Utilisation des outils pré-installés
          CIBW_BEFORE_ALL_WINDOWS: pip install delvewheel
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: "delvewheel repair -w {dest_dir} {wheel}"
          
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl