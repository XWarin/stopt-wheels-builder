name: Build Wheels for StOpt (Boost 1.84 + Eigen 3.4 + pybind11)

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build_wheels:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone StOpt
        run: git clone https://gitlab.com/stochastic-control/StOpt.git

      ###########################################################################
      # WINDOWS : préparer vcpkg dans la source AVANT cibuildwheel
      ###########################################################################
      - name: Prepare vcpkg for Windows
        if: runner.os == 'Windows'
        run: |
          cd StOpt
          rd /s /q vcpkg || true
          git clone https://github.com/microsoft/vcpkg vcpkg
          vcpkg\bootstrap-vcpkg.bat -disableMetrics

      ###########################################################################
      # Installer cibuildwheel + pybind11
      ###########################################################################
      - name: Install cibuildwheel + pybind11
        run: |
          pip install cibuildwheel==2.17.0
          pip install pybind11
        shell: bash

      ###########################################################################
      # Construire wheels
      ###########################################################################
      - name: Build wheels
        run: |
          cd StOpt
          cibuildwheel --output-dir ../wheelhouse
        env:

          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-win32 *_i686 pp* *-musllinux_*"

          #######################################################################
          # LINUX : manylinux + Eigen 3.4 + Boost 1.84
          #######################################################################
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y wget python3-devel cmake make gcc-c++ zlib-devel bzip2-devel &&
            wget https://gitlab.com/libeigen/eigen/-/archive/3.4.0/eigen-3.4.0.tar.gz &&
            tar -xzf eigen-3.4.0.tar.gz &&
            cd eigen-3.4.0 &&
            cmake -B build -DCMAKE_INSTALL_PREFIX=/usr &&
            cmake --build build --target install &&
            cd .. && rm -rf eigen-3.4.0* &&
            wget https://archives.boost.io/release/1.84.0/source/boost_1_84_0.tar.gz &&
            tar -xzf boost_1_84_0.tar.gz &&
            cd boost_1_84_0 && ./bootstrap.sh &&
            ./b2 install --prefix=/usr/local
                --with-serialization --with-system --with-random
                --with-log --with-thread --with-chrono --with-atomic
                threading=multi link=shared &&
            cd .. && rm -rf boost_1_84_0*

          #######################################################################
          # MACOS : compilation manuelle Boost + Brew pour Eigen/Zlib/BZip2
          #######################################################################
          CIBW_BEFORE_ALL_MACOS: >
            brew update &&
            brew install eigen cmake zlib bzip2 &&
            wget https://archives.boost.io/release/1.84.0/source/boost_1_84_0.tar.gz &&
            tar -xzf boost_1_84_0.tar.gz &&
            cd boost_1_84_0 && ./bootstrap.sh &&
            ./b2 install --prefix=/usr/local
                --with-serialization --with-system --with-random
                --with-log --with-thread --with-chrono --with-atomic
                threading=multi link=shared &&
            cd .. && rm -rf boost_1_84_0*

          CIBW_ARCHS_MACOS: "x86_64"

          CIBW_ENVIRONMENT_MACOS: >
            MACOSX_DEPLOYMENT_TARGET=10.15

          # delocate-wheel avec -v pour vérifier l'inclusion des .dylib
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            delocate-wheel -v -w {dest_dir} {wheel}

          #######################################################################
          # WINDOWS : toolchain vcpkg sans installation de ports
          #######################################################################
          CIBW_ENVIRONMENT_WINDOWS: >
            CMAKE_TOOLCHAIN_FILE=./vcpkg/scripts/buildsystems/vcpkg.cmake
            BUILD_MPI=OFF
            BUILD_TEST=OFF
            BUILD_SDDP=OFF
            BUILD_DPCUTS=OFF
            BUILD_BRANCHING=OFF

          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >
            delvewheel repair -w {dest_dir} {wheel}

      ###########################################################################
      - name: Debug wheelhouse
        run: ls -R .

      ###########################################################################
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: "**/*.whl"