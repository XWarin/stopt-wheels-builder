on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build_wheels:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest] # Ajoute ubuntu-latest, macos-latest ici si besoin

    env:
      CIBW_BUILD: "cp310-* cp311-* cp312-*"
      CIBW_SKIP: "*-win32 *_i686 pp* *-musllinux_*"
      # Force scikit-build-core à utiliser le bon interpréteur
      CIBW_ENVIRONMENT_LINUX: "SKBUILD_PYTHON_INTERPRETER={python}"
      
      # Configuration Windows spécifique
      VCPKG_ROOT: ${{ github.workspace }}\StOpt\vcpkg

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone StOpt
        run: git clone https://gitlab.com/stochastic-control/StOpt.git

      ###########################################################################
      # GESTION DU CACHE VCPKG (WINDOWS UNIQUEMENT)
      ###########################################################################
      - name: Cache vcpkg (Windows)
        if: runner.os == 'Windows'
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_ROOT }}
            !${{ env.VCPKG_ROOT }}\buildtrees
            !${{ env.VCPKG_ROOT }}\packages
            !${{ env.VCPKG_ROOT }}\downloads
          key: vcpkg-${{ runner.os }}-${{ hashFiles('StOpt/vcpkg.json') }}-v2
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Prepare vcpkg for Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd StOpt
          # On ne clone/bootstrap que si le cache est vide
          if (-not (Test-Path vcpkg)) {
            git clone https://github.com/microsoft/vcpkg vcpkg
            .\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          }
          # Suppression du vcpkg.json pour forcer l'install manuelle comme demandé
          if (Test-Path vcpkg.json) { Remove-Item -Force vcpkg.json }
          
          # L'installation est instantanée si les libs sont déjà dans le cache
          .\vcpkg\vcpkg.exe install pybind11 boost-multi-array   boost-random   eigen3 --triplet x64-windows

      ###########################################################################
      # BUILD VIA CIBUILDWHEEL
      ###########################################################################
      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.17.0 delvewheel

      - name: Build wheels (Windows)
        if: runner.os == 'Windows'
        run: cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD_FRONTEND: "pip"
          # On installe numpy avant pour que find_package(Python ... NumPy) fonctionne
          CIBW_BEFORE_BUILD_WINDOWS: "pip install numpy"
          
          # ENVIRONNEMENT DYNAMIQUE (Supporte 3.10, 3.11, 3.12 automatiquement)
          CIBW_ENVIRONMENT_WINDOWS: >
            CMAKE_TOOLCHAIN_FILE=../vcpkg/scripts/buildsystems/vcpkg.cmake
            VCPKG_FEATURE_FLAGS=-manifests
            SKBUILD_CMAKE_DEFINE="Python_EXECUTABLE={python};Python_ROOT_DIR={python_root};Python_FIND_STRATEGY=LOCATION;Python_FIND_REGISTRY=NEVER;Python_FIND_VIRTUALENV=ONLY;Python_DEVELOPMENT_MODULE=ON;StOpt_PIP_LAYOUT=ON;BUILD_MPI=OFF;BUILD_TEST=OFF"            
            VCPKG_ENV_PASSTHROUGH_UNTOUCHED=Python_EXECUTABLE;Python_ROOT_DIR

          # Réparation du wheel pour inclure les DLL de vcpkg
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >
            delvewheel repair --add-path ./StOpt/vcpkg/installed/x64-windows/bin -w {dest_dir} {wheel}

          CIBW_TEST_COMMAND: "python -c \"import pystopt; print('Import OK')\""

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl