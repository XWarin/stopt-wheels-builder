name: Build Wheels

on: 
  workflow_dispatch:
  push:
    branches: [ master ]
    tags: [ 'v*' ]

jobs:
  build_wheels:
    name: Build_on_${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    env:
      CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
      CIBW_SKIP: "*-win32 *_i686 pp* *-musllinux_*"
      SKBUILD_VERBOSE: "1"
      CIBW_TEST_REQUIRES: ""
      CIBW_TEST_COMMAND: "python -c \"import pystopt; import pystopt.grids; print('OK')\""
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 

      - name: Clone StOpt
        run: git clone https://gitlab.com/stochastic-control/StOpt.git
        
      - name: Make macOS scripts executable
        if: runner.os == 'macOS'
        run: chmod +x StOpt/utils/*.sh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      ###########################################################################
      # PREPARE DEPENDENCIES (Windows Only)
      ###########################################################################
      - name: Conan cache
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ~/.conan2/p
            ~/.conan2/artifacts
            ~/.conan2/recipes
          key: conan2-${{ runner.os }}-${{ hashFiles('StOpt/conanfile.txt') }}
          restore-keys: |
            conan2-${{ runner.os }}-  


      - name: Install Conan
        if: runner.os == 'Windows'
        run: |
          pip install conan
          conan profile detect --force

      - name: Install Dependencies with Conan
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd StOpt
          conan install . --output-folder=conan_build --build=missing  -s build_type=Release -c tools.cmake.cmaketoolchain:generator=Ninja


      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.21.0  scikit-build-core>=0.9.8 ninja

      ###########################################################################
      # BUILD — Linux & macOS
      ###########################################################################
      - name: Build_wheels_Linux_macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd StOpt
          python -m cibuildwheel --output-dir ../wheelhouse
        env:
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y wget python3-devel cmake make gcc-c++ zlib-devel bzip2-devel &&
            wget https://gitlab.com/libeigen/eigen/-/archive/3.4.0/eigen-3.4.0.tar.gz &&
            tar -xzf eigen-3.4.0.tar.gz &&
            cd eigen-3.4.0 && cmake -B build -DCMAKE_INSTALL_PREFIX=/usr && cmake --build build --target install && cd .. &&
            wget https://archives.boost.io/release/1.84.0/source/boost_1_84_0.tar.gz &&
            tar -xzf boost_1_84_0.tar.gz &&
            cd boost_1_84_0 && ./bootstrap.sh && ./b2 install --prefix=/usr/local --with-serialization --with-system --with-random --with-log --with-thread --with-chrono --with-atomic threading=multi link=shared
          
          CIBW_BEFORE_ALL_MACOS: "brew install boost eigen cmake zlib bzip2"
          
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            export WHEEL_PATH={wheel} &&
            TMPDIR=$(mktemp -d) &&
            unzip "$WHEEL_PATH" -d "$TMPDIR" &&
            bash utils/fix_stopt_macos_libs.sh "$TMPDIR" &&
            (cd "$TMPDIR" && zip -r -9 "$(basename $WHEEL_PATH)" .) &&
            mv "$TMPDIR/$(basename $WHEEL_PATH)" "$WHEEL_PATH" &&
            rm -rf "$TMPDIR" &&
            delocate-wheel -v --lib-sdir pystopt -w {dest_dir} "$WHEEL_PATH"

  
      ###########################################################################
      # BUILD — Windows
      ###########################################################################
      - name: Load MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build_wheel_Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd StOpt
          python -m cibuildwheel --output-dir ../wheelhouse
        env:
          CIBW_BUILD_FRONTEND: "pip"
          # On ajoute ninja explicitement ici pour être sûr
          CIBW_BEFORE_BUILD_WINDOWS: "pip install numpy delvewheel ninja"

          CIBW_ENVIRONMENT_WINDOWS: |
            CMAKE_TOOLCHAIN_FILE="conan_build/conan_toolchain.cmake"
            CMAKE_BUILD_TYPE=Release
            CMAKE_GENERATOR=Ninja
            CMAKE_GENERATOR_PLATFORM=   
            SKBUILD_CMAKE_GENERATOR="Ninja"
            SKBUILD_CMAKE_ARGS="-GNinja"
            STOPT_PIP_LAYOUT=ON
            STOPT_PY_DEST="pystopt"
            BUILD_PYTHON=ON

          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >
            delvewheel repair --add-path conan_build -w {dest_dir} {wheel}
    
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl


  ###########################################################################
  # PUBLISH — TEST PYPI
  ###########################################################################
  publish-test:
    name: Publish to TestPyPI
    needs: [build_wheels]
    runs-on: ubuntu-latest
    # On autorise le job sur master, tags, ou lancement manuel
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true

  ###########################################################################
  # PUBLISH — PROD PYPI
  ###########################################################################
  publish-prod:
    name: Publish to PyPI
    needs: [publish-test] # On attend que le test soit fini
    # Uniquement sur les tags officiels
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/