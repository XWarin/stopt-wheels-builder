name: Build Wheels for StOpt (Boost 1.84 + Log)

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build_wheels:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone StOpt
        run: git clone https://gitlab.com/stochastic-control/StOpt.git

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel + pybind11
        run: |
          pip install cibuildwheel==2.17.0
          pip install pybind11
        shell: bash

      - name: Build wheels
        run: |
          cd StOpt
          python -m cibuildwheel --output-dir ../wheelhouse
        env:
          CIBW_BUILD: "cp311-* cp312-*"
          CIBW_SKIP: "*-win32 *_i686 pp* *-musllinux_*"

          # ===== LINUX (manylinux + Boost 1.84 manually compiled) =====
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y wget python3-devel eigen3-devel cmake make gcc-c++ zlib-devel bzip2-devel &&
            wget https://archives.boost.io/release/1.84.0/source/boost_1_84_0.tar.gz &&
            tar -xzf boost_1_84_0.tar.gz &&
            cd boost_1_84_0 && ./bootstrap.sh &&
            ./b2 install --prefix=/usr/local
              --with-serialization --with-system --with-random
              --with-log --with-thread --with-chrono --with-atomic
              threading=multi link=shared &&
            cd .. && rm -rf boost_1_84_0*

          # ===== MACOS =====
          CIBW_BEFORE_ALL_MACOS: brew install boost eigen cmake
          CIBW_ARCHS_MACOS: "x86_64"
          CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=10.15
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            delocate-wheel --ignore-missing-dependencies -w {dest_dir} {wheel}

          # ===== WINDOWS (vcpkg manifest mode) =====
          CIBW_BEFORE_ALL_WINDOWS: >
            git clone https://github.com/microsoft/vcpkg C:/vcpkg &&
            C:/vcpkg/bootstrap-vcpkg.bat &&
            C:/vcpkg/vcpkg.exe install --triplet x64-windows

          CIBW_ENVIRONMENT_WINDOWS: >
            CMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake

          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >
            delvewheel repair --add-path C:\\vcpkg\\installed\\x64-windows\\bin -w {dest_dir} {wheel}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl